<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a0a0f">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Afinador de Guitarra</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #08080f; --surface: #111118; --surface2: #1a1a24; --surface3: #222230;
  --accent: #00e5ff; --accent2: #ff006e; --accent3: #76ff03;
  --warn: #ffab00; --text: #e8e8f0; --text-dim: #6b6b80;
  --border: rgba(255,255,255,0.07); --border2: rgba(255,255,255,0.12);
  --glow: 0 0 30px rgba(0,229,255,0.25);
  --glow-green: 0 0 40px rgba(118,255,3,0.4);
  --glow-red: 0 0 40px rgba(255,0,110,0.4);
}
html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; user-select: none; -webkit-user-select: none; }
body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; min-height: 100dvh; position: relative; }
body::before { content: ''; position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; background: radial-gradient(ellipse at 30% 20%, rgba(0,229,255,0.04) 0%, transparent 50%), radial-gradient(ellipse at 70% 80%, rgba(255,0,110,0.04) 0%, transparent 50%); pointer-events: none; z-index: 0; }

.app { position: relative; z-index: 1; width: 100%; max-width: 480px; height: 100vh; height: 100dvh; display: flex; flex-direction: column; padding: 14px 16px; gap: 10px; overflow: hidden; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.logo { font-family: 'Orbitron', monospace; font-weight: 900; font-size: 16px; letter-spacing: 3px; color: var(--accent); }
.header-right { display: flex; gap: 8px; align-items: center; }
.mic-btn { background: none; border: 1.5px solid var(--border); border-radius: 50px; padding: 7px 16px; color: var(--text-dim); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 1px; cursor: pointer; transition: all 0.3s; text-transform: uppercase; display: flex; align-items: center; gap: 6px; }
.mic-btn.active { border-color: var(--accent2); color: var(--accent2); animation: pulse-btn 2s infinite; }
@keyframes pulse-btn { 0%,100%{box-shadow:0 0 15px rgba(255,0,110,0.3)}50%{box-shadow:0 0 25px rgba(255,0,110,0.5)} }
.mic-dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; }
.mic-btn.active .mic-dot { animation: blink 1s infinite; }
@keyframes blink { 0%,100%{opacity:1}50%{opacity:0.2} }

/* TUNING ROW */
.tuning-row { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.section-label { font-size: 10px; font-weight: 500; letter-spacing: 2px; text-transform: uppercase; color: var(--text-dim); white-space: nowrap; }
.tuning-scroll { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; flex: 1; scrollbar-width: none; }
.tuning-scroll::-webkit-scrollbar { display: none; }
.tuning-chip { background: var(--surface); border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 12px; font-size: 11px; font-weight: 500; color: var(--text-dim); cursor: pointer; transition: all 0.2s; white-space: nowrap; flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.tuning-chip:hover { border-color: rgba(0,229,255,0.3); color: var(--text); }
.tuning-chip.selected { background: rgba(0,229,255,0.1); border-color: var(--accent); color: var(--accent); }
.tuning-chip .del-chip { font-size: 13px; opacity: 0; transition: opacity 0.2s; line-height: 1; color: var(--accent2); }
.tuning-chip.selected:hover .del-chip { opacity: 1; }
.add-tuning-btn { background: none; border: 1.5px dashed var(--border2); border-radius: 8px; padding: 6px 10px; color: var(--text-dim); font-size: 18px; cursor: pointer; transition: all 0.2s; flex-shrink: 0; line-height: 1; }
.add-tuning-btn:hover { border-color: var(--accent); color: var(--accent); }

/* MAIN DISPLAY */
.main-display { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; min-height: 0; }
.note-display { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.note-big { font-family: 'Orbitron', monospace; font-weight: 900; font-size: clamp(72px, 20vw, 110px); line-height: 1; color: var(--text); transition: color 0.3s, text-shadow 0.3s; letter-spacing: -2px; }
.note-big.in-tune { color: var(--accent3); text-shadow: var(--glow-green); }
.note-big.flat { color: var(--accent); text-shadow: var(--glow); }
.note-big.sharp { color: var(--accent2); text-shadow: var(--glow-red); }
.note-big.idle { color: var(--text-dim); }
.freq-display { font-family: 'Orbitron', monospace; font-size: 13px; color: var(--text-dim); letter-spacing: 2px; }
.freq-display span { color: var(--text); font-weight: 700; }

.meter-container { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 8px; }
.meter-track { position: relative; width: 100%; height: 8px; background: var(--surface2); border-radius: 4px; }
.meter-zones { position: absolute; inset: 0; border-radius: 4px; overflow: hidden; display: flex; }
.zone { flex: 1; opacity: 0.15; }
.zone.left { background: linear-gradient(to right, var(--accent2), transparent); }
.zone.center { background: var(--accent3); opacity: 0.2; flex: 0.3; }
.zone.right { background: linear-gradient(to left, var(--accent), transparent); }
.meter-center-mark { position: absolute; top: -4px; left: 50%; transform: translateX(-50%); width: 2px; height: 16px; background: var(--text-dim); border-radius: 1px; opacity: 0.5; }
.meter-needle { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); width: 16px; height: 16px; border-radius: 50%; background: var(--text-dim); transition: transform 0.12s cubic-bezier(0.34,1.56,0.64,1), background 0.2s, width 0.2s, height 0.2s; box-shadow: 0 0
